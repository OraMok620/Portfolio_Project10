<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showcase</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
    }

    /* Background */
    .hero {
      position: relative;
      height: 100vh;
      background: url('background.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4); /* adjust opacity here */
      z-index: 1;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    .content h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .content p {
      font-size: 1rem;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    /* Hamburger */
    .hamburger {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 3;
      cursor: pointer;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background: white;
      margin: 5px 0;
    }

    /* Menu */
    .menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 70%;
      height: 100%;
      background: white;
      color: black;
      padding: 50px 20px;
      transition: 0.3s;
      z-index: 4;
    }

    .menu.active {
      right: 0;
    }

    .menu a {
      display: block;
      margin: 20px 0;
      text-decoration: none;
      color: black;
      font-size: 1.2rem;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* Desktop */
    @media(min-width: 768px) {
      .content h1 {
        font-size: 2rem;
      }

      .content p {
        font-size: 1.2rem;
      }

      .menu {
        width: 30%;
      }
    }

    /* Showcase Layout */
  .showcase {
    width: 100%;
    max-width: 1000px;
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 15px;
  }

  /* Filter */
  .filter {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 15px;
  }

  .filter select {
    padding: 5px 10px;
    border-radius: 15px;
    border: none;
    font-size: 0.8rem;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* mobile: 2 */
    gap: 15px;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.85);
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    color: black;
    transition: 0.3s;
  }

  .card:hover {
    transform: scale(1.03);
  }

  /* Image */
  .card img {
    width: 100%;
    height: 100px;
    object-fit: cover;
  }

  /* Card text */
  .card-info {
    padding: 8px;
    text-align: center;
  }

  .card-info h3 {
    font-size: 0.8rem;
  }

  .card-info p {
    font-size: 0.7rem;
    opacity: 0.7;
  }

  /* Desktop */
  @media(min-width: 768px) {
    .grid {
      grid-template-columns: repeat(3, 1fr); /* desktop: 3 */
    }

    .card img {
      height: 120px;
    }
  }
  </style>
</head>
<body>

<div class="hero">
  <div class="overlay"></div>

  <!-- Hamburger -->
  <div class="hamburger" onclick="openMenu()">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- Showcase Content -->
  <div class="content showcase">
    <h1 class="title">Showcase</h1>

    <!-- Filter -->
    <div class="filter">
      <select id="filterSelect" onchange="filterProjects()">
        <option value="all">All</option>
        <option value="group1">tag 1</option>
        <option value="group2">tag 2</option>
        <option value="group3">tag 3</option>
      </select>
    </div>

    <!-- Project Grid -->
    <div class="grid" id="projectGrid">

      <!-- Card -->
      <a href="projectDetailsEng.html" class="card" data-category="group1">
        <img src="img1.jpg" alt="">
        <div class="card-info">
          <h3>Project Title</h3>
          <p>tag 1</p>
        </div>
      </a>

      <a href="projectDetailsEng.html" class="card" data-category="group2">
        <img src="img2.jpg" alt="">
        <div class="card-info">
          <h3>Project Title</h3>
          <p>tag 2</p>
        </div>
      </a>

      <a href="projectDetailsEng.html" class="card" data-category="group3">
        <img src="img3.jpg" alt="">
        <div class="card-info">
          <h3>Project Title</h3>
          <p>tag 3</p>
        </div>
      </a>

    </div>
  </div>
</div>

  <!-- Menu -->
  <div class="menu" id="menu">
    <div class="close-btn" onclick="closeMenu()">&times;</div>
    <a href="indexEng.html">Home</a>
    <a href="showcaseEng.html">Projects</a>
    <a href="personalEng.html">Personal</a>
    <a href="mailto: mokoishun620@gmail.com">Contact</a>
  </div>

  <script>
    function openMenu() {
      document.getElementById('menu').classList.add('active');
    }

    function closeMenu() {
      document.getElementById('menu').classList.remove('active');
    }
  </script>

</body>
</html>
