<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #0f172a; color: #e2e8f0; }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
    }

    header h1 { font-size: 2rem; }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .section { margin-bottom: 60px; }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: transform 0.2s ease;
    }

    .card:hover { transform: translateY(-5px); }

    .card h3 { margin-bottom: 10px; }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Portfolio</p>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="container">

  <section id="about" class="section">
    <h2>About Me</h2>
    <p><!-- Enter some information about yourself here... --></p>
  </section>

  <section id="projects" class="section">
    <h2>Projects</h2>
    <div class="projects">

      <div class="card">
        <h3>Project One</h3>
        <p>A short description of your project.</p>
        <a href="#" class="btn">View</a>
      </div>

      <div class="card">
        <h3>Project Two</h3>
        <p>A short description of your project.</p>
        <a href="#" class="btn">View</a>
      </div>

      <div class="card">
        <h3>Project Three</h3>
        <p>A short description of your project.</p>
        <a href="#" class="btn">View</a>
      </div>

    </div>
  </section>

  <section id="contact" class="section">
    <h2>Contact</h2>
    <p>Email: Your Email</p>
  </section>

</div>

<footer>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>
